<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trust Wallet $U Campaign</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0a0a1f, #1a0033);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .banner {
      position: relative;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 50px 30px;
      border-radius: 24px;
      background: linear-gradient(135deg, #0f0f2e, #1e0f4d);
      box-shadow: 0 0 60px rgba(0, 255, 200, 0.35);
      text-align: center;
      overflow: hidden;
    }

    .banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,255,200,0.18) 0%, transparent 70%);
      animation: glow 10s infinite alternate;
    }

    @keyframes glow {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    h1 {
      font-size: 2.8rem;
      line-height: 1.1;
      margin-bottom: 12px;
      text-shadow: 0 0 25px #00ffcc;
    }

    .subtitle {
      font-size: 1.25rem;
      margin-bottom: 25px;
      opacity: 0.95;
    }

    .logos {
      margin: 25px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 35px;
      flex-wrap: wrap;
    }

    .info {
      margin: 20px 0;
      font-size: 1.1rem;
    }

    .highlight {
      color: #00ff88;
      font-size: 1.7rem;
      font-weight: bold;
    }

    .buttons {
      margin-top: 35px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    button {
      padding: 16px 32px;
      font-size: 1.15rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 160px;
    }

    .btn-swap {
      background: #00ff88;
      color: #000;
    }
    .btn-swap:hover { transform: scale(1.08); background: #00ffaa; }

    .btn-deposit {
      background: #00aaff;
      color: white;
    }
    .btn-deposit:hover { transform: scale(1.08); background: #33bbff; }

    .btn-learn {
      background: transparent;
      color: white;
      border: 2px solid #00ffcc;
    }
    .btn-learn:hover { background: rgba(0,255,204,0.15); }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      h1 {
        font-size: 2.2rem;
      }
      .subtitle {
        font-size: 1.1rem;
      }
      .banner {
        padding: 40px 20px;
      }
      button {
        padding: 14px 24px;
        font-size: 1.05rem;
        min-width: 140px;
      }
      .buttons {
        gap: 12px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.9rem;
      }
      .logos {
        gap: 20px;
      }
      .info {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="banner">
    <h1>$U Campaign LIVE on Trust Wallet</h1>
    <p class="subtitle">Swap to $U on BSC • Earn up to 25% APY • Compete for $20,000 Prize Pool</p>

    <div class="logos">
      <strong style="font-size:1.9rem;">Trust Wallet</strong>
      <strong style="font-size:2.6rem; color:#00ffcc;">$U</strong>
    </div>

    <div class="info">
      
      Top wallet wins <span class="highlight">$10000</span><br>
      Deposit $U for boosted rewards
    </div>

    <div class="buttons">
      <button class="btn-swap" onclick="window.open('https://trustwallet.com/', '_blank')">Swap Now</button>
      <button class="btn-deposit" onclick="window.open('https://trustwallet.com/', '_blank')">Deposit to Earn</button>
      <button class="btn-learn" onclick="window.open('https://trustwallet.com/', '_blank')">Learn More</button>
    </div>
  </div>

</body>
</html>
